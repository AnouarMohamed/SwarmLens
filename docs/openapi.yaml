openapi: 3.0.3
info:
  title: SwarmLens Control Plane API
  version: 1.5.0
  description: |
    Canonical v1.5 control-plane contract for SwarmLens.
    Cluster-scoped endpoints are primary. Legacy single-cluster aliases are intentionally omitted.
servers:
  - url: /api/v1
tags:
  - name: Observability
  - name: Auth
  - name: Clusters
  - name: Operations
  - name: Incidents
  - name: Audit
  - name: Actions
  - name: Approvals
  - name: Assistant
paths:
  /healthz:
    get:
      tags: [Observability]
      summary: Liveness probe
      responses:
        '200':
          description: OK
  /readyz:
    get:
      tags: [Observability]
      summary: Readiness probe
      responses:
        '200':
          description: Ready
  /runtime:
    get:
      tags: [Observability]
      summary: Runtime posture
      responses:
        '200':
          description: Runtime payload
  /openapi.yaml:
    get:
      tags: [Observability]
      summary: OpenAPI contract
      responses:
        '200':
          description: OpenAPI YAML
  /auth/me:
    get:
      tags: [Auth]
      summary: Current session identity
      responses:
        '200':
          description: Current identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthIdentityItemResponse'
  /auth/logout:
    post:
      tags: [Auth]
      summary: End current session
      responses:
        '200':
          description: Logout acknowledgement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkItemResponse'
  /clusters:
    get:
      tags: [Clusters]
      summary: List configured clusters
      responses:
        '200':
          description: Cluster list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterListResponse'
    post:
      tags: [Clusters]
      summary: Create a cluster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterCreateRequest'
      responses:
        '201':
          description: Created cluster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterItemResponse'
  /clusters/{clusterID}:
    get:
      tags: [Clusters]
      summary: Get cluster
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      responses:
        '200':
          description: Cluster detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Clusters]
      summary: Update cluster
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterUpdateRequest'
      responses:
        '200':
          description: Updated cluster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /clusters/{clusterID}/swarm:
    get:
      tags: [Operations]
      summary: Get cluster posture
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      responses:
        '200':
          description: Swarm posture
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwarmInfoItemResponse'
  /clusters/{clusterID}/diagnostics:
    get:
      tags: [Operations]
      summary: List diagnostics findings
      parameters:
        - $ref: '#/components/parameters/ClusterID'
        - in: query
          name: severity
          schema:
            $ref: '#/components/schemas/Severity'
      responses:
        '200':
          description: Diagnostics findings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingListResponse'
  /clusters/{clusterID}/incidents:
    get:
      tags: [Incidents]
      summary: List incidents
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      responses:
        '200':
          description: Incidents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentListResponse'
    post:
      tags: [Incidents]
      summary: Create incident
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentCreateRequest'
      responses:
        '201':
          description: Created incident
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentItemResponse'
  /clusters/{clusterID}/incidents/{id}:
    get:
      tags: [Incidents]
      summary: Get incident
      parameters:
        - $ref: '#/components/parameters/ClusterID'
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Incident detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Incidents]
      summary: Update incident
      parameters:
        - $ref: '#/components/parameters/ClusterID'
        - $ref: '#/components/parameters/EntityID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentUpdateRequest'
      responses:
        '200':
          description: Updated incident
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /clusters/{clusterID}/incidents/{id}/resolve:
    post:
      tags: [Incidents]
      summary: Resolve incident
      parameters:
        - $ref: '#/components/parameters/ClusterID'
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Resolved incident
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /clusters/{clusterID}/audit:
    get:
      tags: [Audit]
      summary: List audit entries
      parameters:
        - $ref: '#/components/parameters/ClusterID'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Audit entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEntryListResponse'
  /clusters/{clusterID}/ops/metrics:
    get:
      tags: [Operations]
      summary: Cluster metrics
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      responses:
        '200':
          description: Operational metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsMetricsItemResponse'
  /clusters/{clusterID}/ops/insights:
    get:
      tags: [Operations]
      summary: Cluster insights
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      responses:
        '200':
          description: Operational insights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsInsightsItemResponse'
  /clusters/{clusterID}/actions:
    get:
      tags: [Actions]
      summary: List action runs
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      responses:
        '200':
          description: Action runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionRunListResponse'
  /clusters/{clusterID}/actions/execute:
    post:
      tags: [Actions]
      summary: Execute or queue an action
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionExecuteRequest'
      responses:
        '200':
          description: Action outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionOutcomeItemResponse'
  /clusters/{clusterID}/approvals:
    get:
      tags: [Approvals]
      summary: List approval requests
      parameters:
        - $ref: '#/components/parameters/ClusterID'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ApprovalStatus'
      responses:
        '200':
          description: Approval requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequestListResponse'
  /clusters/{clusterID}/approvals/{id}/approve:
    post:
      tags: [Approvals]
      summary: Approve pending action
      parameters:
        - $ref: '#/components/parameters/ClusterID'
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Approval outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionOutcomeItemResponse'
  /clusters/{clusterID}/approvals/{id}/reject:
    post:
      tags: [Approvals]
      summary: Reject pending action
      parameters:
        - $ref: '#/components/parameters/ClusterID'
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Rejection outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionOutcomeItemResponse'
  /clusters/{clusterID}/assistant/sessions:
    get:
      tags: [Assistant]
      summary: List assistant sessions
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      responses:
        '200':
          description: Assistant sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSessionListResponse'
    post:
      tags: [Assistant]
      summary: Create assistant session
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantSessionCreateRequest'
      responses:
        '201':
          description: Created assistant session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSessionItemResponse'
  /clusters/{clusterID}/assistant/sessions/{id}:
    get:
      tags: [Assistant]
      summary: Get assistant session
      parameters:
        - $ref: '#/components/parameters/ClusterID'
        - $ref: '#/components/parameters/EntityID'
      responses:
        '200':
          description: Assistant session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSessionItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /clusters/{clusterID}/assistant/chat:
    post:
      tags: [Assistant]
      summary: Stream assistant response
      parameters:
        - $ref: '#/components/parameters/ClusterID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantChatRequest'
      responses:
        '200':
          description: Event stream with context, insights, citations, and message payloads
          content:
            text/event-stream:
              schema:
                type: string
components:
  parameters:
    ClusterID:
      in: path
      name: clusterID
      required: true
      schema:
        type: string
    EntityID:
      in: path
      name: id
      required: true
      schema:
        type: string
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
    cookieSession:
      type: apiKey
      in: cookie
      name: swarmlens_session
  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string
    ListMeta:
      type: object
      required: [total]
      properties:
        total:
          type: integer
          minimum: 0
    Role:
      type: string
      enum: [viewer, operator, admin]
    AppMode:
      type: string
      enum: [dev, demo, prod]
    Severity:
      type: string
      enum: [critical, high, medium, low, info]
    FreshnessState:
      type: string
      enum: [live, stale, disconnected]
    ClusterConnectionMode:
      type: string
      enum: [direct, demo]
    IncidentStatus:
      type: string
      enum: [open, investigating, mitigating, resolved]
    ActionStatus:
      type: string
      enum: [success, failed, dry_run, blocked, pending_approval]
    ApprovalStatus:
      type: string
      enum: [pending, approved, rejected]
    AuditResult:
      type: string
      enum: [success, failed, rejected, pending_approval]
    RiskAssessment:
      type: object
      required: [score, confidence, factors, source, updatedAt]
      properties:
        score:
          type: number
        confidence:
          type: number
        factors:
          type: array
          items:
            type: string
        source:
          type: string
        updatedAt:
          type: string
          format: date-time
    ClusterHealth:
      type: object
      required: [freshness, managers, workers, reachable]
      properties:
        freshness:
          $ref: '#/components/schemas/FreshnessState'
        lastSyncAt:
          type: string
          format: date-time
        lastSyncError:
          type: string
        managers:
          type: integer
        workers:
          type: integer
        reachable:
          type: boolean
    Cluster:
      type: object
      required: [id, name, dockerHost, connectionMode, tlsEnabled, certRef, enabled, default, createdAt, updatedAt, health]
      properties:
        id:
          type: string
        name:
          type: string
        dockerHost:
          type: string
        connectionMode:
          $ref: '#/components/schemas/ClusterConnectionMode'
        tlsEnabled:
          type: boolean
        certRef:
          type: string
        enabled:
          type: boolean
        default:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        health:
          $ref: '#/components/schemas/ClusterHealth'
    ClusterCreateRequest:
      type: object
      required: [name, dockerHost]
      properties:
        name:
          type: string
        dockerHost:
          type: string
        connectionMode:
          $ref: '#/components/schemas/ClusterConnectionMode'
        tlsEnabled:
          type: boolean
        certRef:
          type: string
        enabled:
          type: boolean
        default:
          type: boolean
    ClusterUpdateRequest:
      type: object
      properties:
        name:
          type: string
        dockerHost:
          type: string
        connectionMode:
          $ref: '#/components/schemas/ClusterConnectionMode'
        tlsEnabled:
          type: boolean
        certRef:
          type: string
        enabled:
          type: boolean
        default:
          type: boolean
    AuthIdentity:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        username:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        provider:
          type: string
        groups:
          type: array
          items:
            type: string
        csrfToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    SwarmInfo:
      type: object
      required: [clusterID, createdAt, updatedAt, managers, workers, quorumHealthy, raftState, mode, writeEnabled, freshness, lastSyncAt, risk]
      properties:
        clusterID:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        managers:
          type: integer
        workers:
          type: integer
        quorumHealthy:
          type: boolean
        raftState:
          type: string
          enum: [healthy, degraded, single, unknown]
        mode:
          $ref: '#/components/schemas/AppMode'
        writeEnabled:
          type: boolean
        freshness:
          $ref: '#/components/schemas/FreshnessState'
        lastSyncAt:
          type: string
          format: date-time
        syncError:
          type: string
        risk:
          $ref: '#/components/schemas/RiskAssessment'
    Finding:
      type: object
      required: [id, severity, resource, scope, message, evidence, recommendation, source, detectedAt]
      properties:
        id:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        resource:
          type: string
        scope:
          type: string
        message:
          type: string
        evidence:
          type: array
          items:
            type: string
        recommendation:
          type: string
        source:
          type: string
        detectedAt:
          type: string
          format: date-time
    RunbookStep:
      type: object
      required: [id, title, description, status]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, done, skipped]
        completedBy:
          type: string
        completedAt:
          type: string
          format: date-time
    TimelineEntry:
      type: object
      required: [id, actor, action, note, timestamp]
      properties:
        id:
          type: string
        actor:
          type: string
        action:
          type: string
        note:
          type: string
        timestamp:
          type: string
          format: date-time
    Incident:
      type: object
      required: [id, title, description, severity, status, createdBy, createdAt, updatedAt, affectedServices, diagnosticRefs, runbookSteps, timeline]
      properties:
        id:
          type: string
        clusterID:
          type: string
        title:
          type: string
        description:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/IncidentStatus'
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
        affectedServices:
          type: array
          items:
            type: string
        diagnosticRefs:
          type: array
          items:
            type: string
        runbookSteps:
          type: array
          items:
            $ref: '#/components/schemas/RunbookStep'
        timeline:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEntry'
    IncidentCreateRequest:
      type: object
      required: [title, description, severity]
      properties:
        title:
          type: string
        description:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        affectedServices:
          type: array
          items:
            type: string
        diagnosticRefs:
          type: array
          items:
            type: string
    IncidentUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/IncidentStatus'
        affectedServices:
          type: array
          items:
            type: string
        diagnosticRefs:
          type: array
          items:
            type: string
    AuditEntry:
      type: object
      required: [id, actor, role, action, resource, resourceID, result, timestamp]
      properties:
        id:
          type: string
        clusterID:
          type: string
        actionRunID:
          type: string
        actor:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        action:
          type: string
        resource:
          type: string
        resourceID:
          type: string
        beforeSpec:
          type: object
          additionalProperties: true
        afterSpec:
          type: object
          additionalProperties: true
        result:
          $ref: '#/components/schemas/AuditResult'
        reason:
          type: string
        timestamp:
          type: string
          format: date-time
    ActionOutcome:
      type: object
      required: [action, resource, resourceID, status, mode, executed, message, timestamp]
      properties:
        id:
          type: string
        clusterID:
          type: string
        action:
          type: string
        resource:
          type: string
        resourceID:
          type: string
        reason:
          type: string
        status:
          $ref: '#/components/schemas/ActionStatus'
        mode:
          type: string
        executed:
          type: boolean
        approvalID:
          type: string
        approvalRequired:
          type: boolean
        message:
          type: string
        blockedReason:
          type: string
        impact:
          type: string
        plan:
          type: array
          items:
            type: string
        auditID:
          type: string
        timestamp:
          type: string
          format: date-time
    ActionRun:
      type: object
      required: [id, clusterID, action, resource, resourceID, requestedBy, requestedRole, reason, status, mode, executed, approvalRequired, createdAt, updatedAt]
      properties:
        id:
          type: string
        clusterID:
          type: string
        action:
          type: string
        resource:
          type: string
        resourceID:
          type: string
        requestedBy:
          type: string
        requestedRole:
          $ref: '#/components/schemas/Role'
        reason:
          type: string
        status:
          $ref: '#/components/schemas/ActionStatus'
        mode:
          type: string
        executed:
          type: boolean
        approvalRequired:
          type: boolean
        approvalID:
          type: string
        auditID:
          type: string
        message:
          type: string
        blockedReason:
          type: string
        impact:
          type: string
        plan:
          type: array
          items:
            type: string
        params:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    ApprovalRequest:
      type: object
      required: [id, clusterID, actionRunID, action, resource, resourceID, requestedBy, requestedRole, reason, status, createdAt]
      properties:
        id:
          type: string
        clusterID:
          type: string
        actionRunID:
          type: string
        action:
          type: string
        resource:
          type: string
        resourceID:
          type: string
        requestedBy:
          type: string
        requestedRole:
          $ref: '#/components/schemas/Role'
        reason:
          type: string
        status:
          $ref: '#/components/schemas/ApprovalStatus'
        resolutionReason:
          type: string
        resolvedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
    AssistantCitation:
      type: object
      required: [id, kind, title, locator]
      properties:
        id:
          type: string
        kind:
          type: string
        title:
          type: string
        locator:
          type: string
        snippet:
          type: string
    AssistantActionProposal:
      type: object
      required: [title, action, reason, requiresApproval]
      properties:
        title:
          type: string
        action:
          type: string
        resource:
          type: string
        resourceID:
          type: string
        reason:
          type: string
        params:
          type: object
          additionalProperties: true
        requiresApproval:
          type: boolean
    AssistantMessage:
      type: object
      required: [id, sessionID, role, content, createdAt]
      properties:
        id:
          type: string
        sessionID:
          type: string
        role:
          type: string
        content:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/AssistantCitation'
        actionProposals:
          type: array
          items:
            $ref: '#/components/schemas/AssistantActionProposal'
        createdAt:
          type: string
          format: date-time
    AssistantSession:
      type: object
      required: [id, clusterID, title, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: string
        clusterID:
          type: string
        incidentID:
          type: string
        title:
          type: string
        createdBy:
          type: string
        lastSummary:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AssistantMessage'
    AssistantSessionCreateRequest:
      type: object
      properties:
        title:
          type: string
        incidentID:
          type: string
    AssistantChatRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        sessionID:
          type: string
        incidentID:
          type: string
    ActionExecuteRequest:
      type: object
      required: [action, reason]
      properties:
        action:
          type: string
        resource:
          type: string
        resourceID:
          type: string
        reason:
          type: string
        params:
          type: object
          additionalProperties: true
    OpsMetricPoint:
      type: object
      required: [timestamp, healthyRatio, managersOnline, workersOnline, runningTasks, failedTasks, restartCount, critical, warning, riskScore]
      properties:
        timestamp:
