version: "3.9"

services:
  swarmlens:
    image: ${SWARMLENS_IMAGE:-ghcr.io/anouarmohamed/swarmlens:latest}
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        delay: 5s
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      APP_MODE: demo
      AUTH_ENABLED: "false"
      WRITE_ACTIONS_ENABLED: "false"
      PREDICTOR_BASE_URL: http://predictor:8001
      PREDICTOR_SHARED_SECRET: "demo-secret"
    networks: [swarmlens_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  predictor:
    image: ${SWARMLENS_PREDICTOR_IMAGE:-ghcr.io/anouarmohamed/swarmlens-predictor:latest}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      PREDICTOR_SHARED_SECRET: "demo-secret"
    networks: [swarmlens_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  swarmlens_net:
    driver: overlay
