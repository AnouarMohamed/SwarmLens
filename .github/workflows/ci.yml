name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go vet + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install toolchain for race detector
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - name: Download modules
        run: cd backend && go mod download
      - name: Go format check
        run: cd backend && test -z "$(gofmt -l .)"
      - name: Go vet
        run: cd backend && go vet ./...
      - name: Go tests (race)
        run: cd backend && CGO_ENABLED=1 go test -race ./...

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint (CI profile)
        run: npm run lint:ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  predictor:
    name: Predictor (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: predictor/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r predictor/requirements.txt
          pip install pytest httpx
      - name: Run predictor tests
        run: cd predictor && python -m pytest -q

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend, predictor]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build main image
        run: docker build -t swarmlens:ci .
      - name: Build predictor image
        run: docker build -t swarmlens-predictor:ci predictor/
