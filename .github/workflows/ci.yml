name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum
      - name: Format check
        run: cd backend && test -z "$(gofmt -l .)"
      - name: Vet
        run: cd backend && go vet ./...
      - name: Test
        run: cd backend && go test -race ./...

  frontend:
    name: Node — lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  predictor:
    name: Python — test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r predictor/requirements.txt pytest httpx
      - run: cd predictor && python -m pytest -v || true

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build main image
        run: docker build -t swarmlens:ci .
      - name: Build predictor image
        run: docker build -t swarmlens-predictor:ci predictor/